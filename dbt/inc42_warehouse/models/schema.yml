version: 2

models:
  - name: contacts
    description: "Silver contacts: one row per unified person with best fields from all sources"
    columns:
      - name: unified_contact_id
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null

  - name: hubspot_contacts_latest
    description: "Silver: one row per HubSpot contact (latest by modified_at), with normalized email/phone/linkedin and associated company ids flattened"
    columns:
      - name: hubspot_contact_id
        tests:
          - unique
          - not_null

  - name: hubspot_companies_latest
    description: "Silver: one row per HubSpot company (latest by modified_at)"
    columns:
      - name: hubspot_company_id
        tests:
          - unique
          - not_null

  - name: hubspot_deals_latest
    description: "Silver: one row per HubSpot deal (latest by modified_at), with associated contact and company ids flattened"
    columns:
      - name: hubspot_deal_id
        tests:
          - unique
          - not_null

  - name: dim_contact
    description: "Gold dimension: master contact"
    columns:
      - name: contact_key
        tests:
          - unique
          - not_null

  - name: fact_orders
    description: "Gold fact: one row per WooCommerce order"
    columns:
      - name: order_id
        tests:
          - not_null

  - name: fact_hubspot_deals
    description: "Gold fact: one row per HubSpot deal with primary contact_key / company_key resolved"
    columns:
      - name: hubspot_deal_id
        tests:
          - unique
          - not_null

  - name: fact_form_submissions
    description: "Gold fact: one row per form submission (Gravity + Tally)"

  - name: fact_event_attendance
    description: "Gold fact: one row per event registration from WooCommerce"

  - name: fact_marketing_touchpoints
    description: "Gold fact: one row per Customer.io email delivery with metrics"

  - name: contact_360
    description: "Gold wide: everything about a person in one row"
    columns:
      - name: contact_key
        tests:
          - unique
          - not_null
